services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ironengine
      POSTGRES_PASSWORD: ironengine_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bin/rails server -b 0.0.0.0
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USERNAME: ironengine
      DB_PASSWORD: ironengine_dev
    tty: true
    stdin_open: true

volumes:
  postgres_data:
  bundle_cache:
